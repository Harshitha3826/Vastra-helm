---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: jwt-secret
  namespace: {{ .Values.environment | default "dev" }}
spec:
  encryptedData:
    JWT_EXPIRES_IN: {{ if eq .Values.environment "main" }}{{ else }}{{ end }}
    JWT_SECRET: {{ if eq .Values.environment "main" }}{{ else }}{{ end }}
  template:
    metadata:
      name: jwt-secret
      namespace: {{ .Values.environment | default "dev" }}
    type: Opaque
