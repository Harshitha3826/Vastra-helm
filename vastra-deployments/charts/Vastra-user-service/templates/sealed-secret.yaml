---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: users-db-secret
  namespace: {{ .Values.environment | default "dev" }}
spec:
  encryptedData:
    POSTGRES_DB: {{ if eq .Values.environment "main" }}{{ else }}{{ end }}
    POSTGRES_PASSWORD: {{ if eq .Values.environment "main" }}{{ else }}{{ end }}
    POSTGRES_USER: {{ if eq .Values.environment "main" }}{{ else }}{{ end }}
  template:
    metadata:
      name: users-db-secret
      namespace: {{ .Values.environment | default "dev" }}
    type: Opaque
