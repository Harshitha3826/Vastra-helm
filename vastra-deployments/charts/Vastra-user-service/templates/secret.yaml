apiVersion: v1
kind: Secret
metadata:
  name: user-service-secret
type: Opaque
data:
  # All sensitive values (JWT_SECRET, DB credentials) are managed by
  # SealedSecrets — see secrets/dev/jwt-secret.yaml and secrets/dev/users-db-secret.yaml
  # This secret is kept for any future non-sealed app-level secrets only.
  # DB_PASSWORD is sourced from the users-db-secret SealedSecret (POSTGRES_PASSWORD key)
  DB_PASSWORD: {{ .Values.env.DB_PASSWORD | default "postgrespassword" | b64enc | quote }}
