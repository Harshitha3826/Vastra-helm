apiVersion: v1
kind: Secret
metadata:
  name: order-service-secret
type: Opaque
data:
  # All sensitive values (JWT_SECRET, DB credentials) are managed by
  # SealedSecrets — see secrets/dev/jwt-secret.yaml and secrets/dev/orders-db-secret.yaml
  # DB_PASSWORD is sourced from the orders-db-secret SealedSecret (POSTGRES_PASSWORD key)
  DB_PASSWORD: {{ .Values.env.DB_PASSWORD | default "postgrespassword" | b64enc | quote }}
