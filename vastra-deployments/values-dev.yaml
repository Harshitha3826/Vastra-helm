# Development Environment Values
# Namespace: dev
# Deploy: helm upgrade -i vastra-dev . -n dev --values values-dev.yaml
#
# NOTE: Sensitive values (JWT_SECRET, DB passwords) are managed by SealedSecrets.
# Apply SealedSecrets FIRST before deploying:
#   kubectl apply -f secrets/dev/ -n dev

postgresql:
  usersDb:
    name: "users_db"
    user: "postgres"
  productsDb:
    name: "products_db"
    user: "postgres"
  ordersDb:
    name: "orders_db"
    user: "postgres"

# Key must match Chart.yaml dependency name: Vastra-user-service
Vastra-user-service:
  image: harshithasrinivas03/user-service
  tag: latest
  imagePullPolicy: Always
  port: 3001
  replicas: 1
  env:
    NODE_ENV: "dev"
    # DB connection — credentials injected via SealedSecret 'users-db-secret'
    USER_DB_HOST: "users-db-svc.dev.svc.cluster.local"
    USER_DB_PORT: "5432"
    USER_DB_NAME: "users_db"
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "200m"
  hpa:
    enabled: true
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 70

# Key must match Chart.yaml dependency name: Vastra-product-service
Vastra-product-service:
  image: harshithasrinivas03/product-service
  tag: latest
  imagePullPolicy: Always
  port: 3002
  replicas: 1
  env:
    NODE_ENV: "dev"
    # DB connection — credentials injected via SealedSecret 'products-db-secret'
    PRODUCT_DB_HOST: "products-db-svc.dev.svc.cluster.local"
    PRODUCT_DB_PORT: "5432"
    PRODUCT_DB_NAME: "products_db"
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "200m"
  hpa:
    enabled: true
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 70

# Key must match Chart.yaml dependency name: Vastra-order-service
Vastra-order-service:
  image: harshithasrinivas03/order-service
  tag: latest
  imagePullPolicy: Always
  port: 3003
  replicas: 1
  env:
    NODE_ENV: "dev"
    # DB connection — credentials injected via SealedSecret 'orders-db-secret'
    ORDER_DB_HOST: "orders-db-svc.dev.svc.cluster.local"
    ORDER_DB_PORT: "5432"
    ORDER_DB_NAME: "orders_db"
    # JWT_SECRET injected via SealedSecret 'jwt-secret'
    PRODUCT_SERVICE_URL: "http://product-service.dev.svc.cluster.local:3002"
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "200m"
  hpa:
    enabled: true
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 70

# Key must match Chart.yaml dependency name: frontend
frontend:
  image: harshithasrinivas03/frontend-service
  tag: latest
  imagePullPolicy: Always
  port: 80
  replicas: 1
  env:
    NODE_ENV: "dev"
    USER_SERVICE_URL: "http://user-service.dev.svc.cluster.local:3001"
    PRODUCT_SERVICE_URL: "http://product-service.dev.svc.cluster.local:3002"
    ORDER_SERVICE_URL: "http://order-service.dev.svc.cluster.local:3003"
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "200m"
  hpa:
    enabled: true
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 70

gateway:
  enabled: true
  className: "kgateway"
  port: 80

storage:
  className: "nfs-client"
  size: "1Gi"

environment: "dev"
debug: true
