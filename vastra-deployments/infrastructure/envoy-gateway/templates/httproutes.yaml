apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: vastra-routes
spec:
  parentRefs:
  - name: vastra-gateway
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /api/auth
    backendRefs:
    - name: user-service
      port: 3001
  - matches:
    - path:
        type: PathPrefix
        value: /api/products
    - path:
        type: PathPrefix
        value: /api/categories
    backendRefs:
    - name: product-service
      port: 3002
  - matches:
    - path:
        type: PathPrefix
        value: /api/orders
    backendRefs:
    - name: order-service
      port: 3003
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: frontend-service
      port: 80
