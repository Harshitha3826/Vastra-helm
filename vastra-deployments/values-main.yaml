# Main Environment Values
# Namespace: main
# Deploy: helm upgrade -i vastra-main . -n main --values values-main.yaml

postgresql:
  usersDb:
    name: "users_db_main"
    user: "postgres"
    password: "main_postgres_password_change_me"
  productsDb:
    name: "products_db_main"
    user: "postgres"
    password: "main_postgres_password_change_me"
  ordersDb:
    name: "orders_db_main"
    user: "postgres"
    password: "main_postgres_password_change_me"
# Key must match Chart.yaml dependency name: Vastra-user-service
Vastra-user-service:
  image: harshithasrinivas03/user-service
  tag: latest
  imagePullPolicy: Always
  port: 3001
  replicas: 2
  env:
    NODE_ENV: "main"
    # DB connection — credentials injected via SealedSecret 'users-db-secret'
    USER_DB_HOST: "users-db-svc.main.svc.cluster.local"
    USER_DB_PORT: "5432"
    USER_DB_NAME: "users_db_main"
    # JWT_SECRET injected via SealedSecret 'jwt-secret'
  resources:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "512Mi"
      cpu: "500m"
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 60
# Key must match Chart.yaml dependency name: Vastra-product-service
Vastra-product-service:
  image: harshithasrinivas03/product-service
  tag: latest
  imagePullPolicy: Always
  port: 3002
  replicas: 2
  env:
    NODE_ENV: "main"
    # DB connection — credentials injected via SealedSecret 'products-db-secret'
    PRODUCT_DB_HOST: "products-db-svc.main.svc.cluster.local"
    PRODUCT_DB_PORT: "5432"
    PRODUCT_DB_NAME: "products_db_main"
  resources:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "512Mi"
      cpu: "500m"
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 60
# Key must match Chart.yaml dependency name: Vastra-order-service
Vastra-order-service:
  image: harshithasrinivas03/order-service
  tag: latest
  imagePullPolicy: Always
  port: 3003
  replicas: 2
  env:
    NODE_ENV: "main"
    # DB connection — credentials injected via SealedSecret 'orders-db-secret'
    ORDER_DB_HOST: "orders-db-svc.main.svc.cluster.local"
    ORDER_DB_PORT: "5432"
    ORDER_DB_NAME: "orders_db_main"
    # JWT_SECRET injected via SealedSecret 'jwt-secret'
    PRODUCT_SERVICE_URL: "http://product-service.main.svc.cluster.local:3002"
  resources:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "512Mi"
      cpu: "500m"
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 60
# Key must match Chart.yaml dependency name: frontend
frontend:
  image: harshithasrinivas03/frontend-service
  tag: v0.0.6
  imagePullPolicy: Always
  port: 80
  replicas: 2
  env:
    NODE_ENV: "main"
    USER_SERVICE_URL: "http://user-service.main.svc.cluster.local:3001"
    PRODUCT_SERVICE_URL: "http://product-service.main.svc.cluster.local:3002"
    ORDER_SERVICE_URL: "http://order-service.main.svc.cluster.local:3003"
  resources:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "512Mi"
      cpu: "500m"
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 60
gateway:
  enabled: true
  className: "kgateway"
  port: 80
storage:
  className: "nfs-client"
  size: "5Gi"
environment: "main"
debug: false
affinity:
  enabled: true
  topologyKey: "kubernetes.io/hostname"
podDisruptionBudget:
  enabled: true
  minAvailable: 1
securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 2000
networkPolicy:
  enabled: true
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: "kgateway-system"
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              name: "kgateway-system"
    - to: []
      ports:
        - protocol: TCP
          port: 5432
monitoring:
  enabled: true
  prometheus:
    enabled: true
    port: 9090
  grafana:
    enabled: true
    port: 3000
backup:
  enabled: true
  schedule: "0 2 * * *"
  retention: "7d"
