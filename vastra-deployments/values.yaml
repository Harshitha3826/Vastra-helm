postgresql:
  usersDb:
    name: "users_db"
    user: "postgres"
    password: "postgrespassword"
  productsDb:
    name: "products_db"
    user: "postgres"
    password: "postgrespassword"
  ordersDb:
    name: "orders_db"
    user: "postgres"
    password: "postgrespassword"

Vastra-user-service:
  image: harshithasrinivas03/user-service
  tag: latest
  imagePullPolicy: Always
  port: 3001
  replicas: 1
  env:
    NODE_ENV: "main"
    JWT_SECRET: "vastraco_super_secret_jwt_key_change_in_prod"
    USER_DB_HOST: "users-db-svc.dev.svc.cluster.local"
    USER_DB_PORT: "5432"
    USER_DB_NAME: "users_db"
    USER_DB_USER: "postgres"
    USER_DB_PASSWORD: "postgrespassword"
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "200m"
  hpa:
    enabled: false
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilizationPercentage: 80

Vastra-product-service:
  image: harshithasrinivas03/product-service
  tag: latest
  imagePullPolicy: Always
  port: 3002
  replicas: 1
  env:
    NODE_ENV: "main"
    PRODUCT_DB_HOST: "products-db-svc.dev.svc.cluster.local"
    PRODUCT_DB_PORT: "5432"
    PRODUCT_DB_NAME: "products_db"
    PRODUCT_DB_USER: "postgres"
    PRODUCT_DB_PASSWORD: "postgrespassword"
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "200m"
  hpa:
    enabled: false
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilizationPercentage: 80

Vastra-order-service:
  image: harshithasrinivas03/order-service
  tag: latest
  imagePullPolicy: Always
  port: 3003
  replicas: 1
  env:
    NODE_ENV: "main"
    JWT_SECRET: "vastraco_super_secret_jwt_key_change_in_prod"
    ORDER_DB_HOST: "orders-db-svc.dev.svc.cluster.local"
    ORDER_DB_PORT: "5432"
    ORDER_DB_NAME: "orders_db"
    ORDER_DB_USER: "postgres"
    ORDER_DB_PASSWORD: "postgrespassword"
    PRODUCT_SERVICE_URL: "http://product-service.dev.svc.cluster.local:3002"
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "200m"
  hpa:
    enabled: false
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilizationPercentage: 80

# Key: 'frontend' matches the dependency name in Chart.yaml
frontend:
  image: harshithasrinivas03/frontend-service
  tag: latest
  imagePullPolicy: Always
  port: 80
  replicas: 1
  env:
    USER_SERVICE_URL: "http://user-service.dev.svc.cluster.local:3001"
    PRODUCT_SERVICE_URL: "http://product-service.dev.svc.cluster.local:3002"
    ORDER_SERVICE_URL: "http://order-service.dev.svc.cluster.local:3003"
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "200m"
  hpa:
    enabled: false
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilizationPercentage: 80